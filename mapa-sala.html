<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mapa da sala · RSB Lisboa</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="assets/rsb-brasao.png">
<style>
  :root {
    --rsb-red: #E30613;
    --rsb-red-dark: #b00410;
    --texto: #0f172a;
    --texto-mute: #475569;
    --texto-soft: #94a3b8;
    --linha: #cbd5e1;
    --linha-clara: #e2e8f0;
    --fundo: #f5f5f7;
    --fundo-soft: #fafafa;
    --lugar-livre: #f1f5f9;
    --lugar-livre-borda: #cbd5e1;
    --lugar-livre-texto: #1e293b;
    --lugar-r: #fde047;
    --lugar-r-borda: #b45309;
    --lugar-r-texto: #78350f;
    --lugar-ocupado: #dbeafe;
    --lugar-ocupado-borda: #2563eb;
    --lugar-presente: #dcfce7;
    --lugar-presente-borda: #16a34a;
    --sh-sm: 0 1px 2px rgba(15,23,42,0.05);
    --sh-md: 0 2px 8px rgba(15,23,42,0.06), 0 1px 3px rgba(15,23,42,0.04);
    --sh-lg: 0 8px 28px rgba(15,23,42,0.10), 0 2px 6px rgba(15,23,42,0.05);
    --sh-xl: 0 24px 60px rgba(15,23,42,0.18), 0 8px 24px rgba(15,23,42,0.08);
    --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--fundo);
    color: var(--texto);
    font-family: "Inter", "Segoe UI", "Calibri", system-ui, sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "cv11", "ss01", "ss03";
  }

  /* --- Top toolbar: cleaner hierarchy + sticky com sombra subtil --- */
  .top {
    background: rgba(255,255,255,0.92);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--linha-clara);
    padding: 14px 22px;
    display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 50;
    box-shadow: var(--sh-sm);
  }
  .top h1 {
    margin: 0; font-size: 15px;
    color: var(--rsb-red); text-transform: uppercase;
    letter-spacing: 0.08em; font-weight: 800;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .top h1::before {
    content: ""; width: 4px; height: 18px;
    background: var(--rsb-red); border-radius: 2px;
    display: inline-block;
  }
  .top .meta {
    font-size: 12.5px; color: var(--texto-mute);
    padding-left: 14px; border-left: 1px solid var(--linha-clara);
    font-variant-numeric: tabular-nums;
  }
  .top .grow { flex: 1; }
  .top button {
    padding: 8px 14px; font-size: 13px;
    border: 1px solid var(--linha); background: #fff;
    border-radius: 8px; cursor: pointer; font-family: inherit;
    font-weight: 600; color: var(--texto);
    transition: transform 0.14s var(--ease), box-shadow 0.14s var(--ease), background 0.14s var(--ease), border-color 0.14s var(--ease);
  }
  .top button:hover {
    background: var(--fundo-soft); border-color: #94a3b8;
    box-shadow: var(--sh-sm);
  }
  .top button:active { transform: translateY(1px); }
  .top button.print {
    background: linear-gradient(180deg, #ee1c2a 0%, var(--rsb-red) 60%, var(--rsb-red-dark) 100%);
    color: #fff; border-color: var(--rsb-red-dark);
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    box-shadow: 0 1px 0 rgba(255,255,255,0.18) inset, 0 1px 2px rgba(176,4,16,0.35);
  }
  .top button.print:hover {
    background: linear-gradient(180deg, var(--rsb-red) 0%, var(--rsb-red-dark) 100%);
    border-color: var(--rsb-red-dark);
    box-shadow: 0 1px 0 rgba(255,255,255,0.18) inset, 0 4px 12px rgba(176,4,16,0.30);
  }

  /* --- Layout --- */
  .wrap {
    max-width: 1240px;
    margin: 24px auto;
    padding: 0 20px 64px;
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 24px;
  }
  @media (max-width: 900px) {
    .wrap { grid-template-columns: 1fr; }
  }

  /* --- Card do mapa --- */
  .mapa-card {
    background: #fff;
    border-radius: 16px;
    padding: 28px;
    box-shadow: var(--sh-md);
    border: 1px solid var(--linha-clara);
  }
  .mapa-card h2 {
    margin: 0 0 6px; font-size: 18px;
    text-align: center; color: var(--texto);
    font-weight: 700; letter-spacing: -0.01em;
  }
  .mapa-card .local {
    margin: 0 0 20px; font-size: 12.5px;
    color: var(--texto-mute); text-align: center;
    letter-spacing: 0.02em;
  }
  svg.mapa {
    width: 100%; height: auto;
    background: radial-gradient(ellipse at center top, #fafbfc 0%, #f3f4f6 100%);
    border-radius: 12px;
    border: 1px solid var(--linha-clara);
    display: block;
  }
  .palco {
    fill: var(--rsb-red);
    opacity: 0.92;
  }
  .palco-label {
    fill: #fff; font-size: 18px; font-weight: 800;
    text-anchor: middle; text-transform: uppercase; letter-spacing: 0.12em;
  }

  /* --- Lugares: estados elegantes com transições refinadas --- */
  .lugar {
    cursor: pointer;
    transition: transform 0.16s var(--ease), filter 0.16s var(--ease);
    transform-origin: center;
    transform-box: fill-box;
  }
  .lugar:hover {
    transform: scale(1.10);
    filter: drop-shadow(0 2px 4px rgba(15,23,42,0.18));
  }
  .lugar:focus { outline: none; }
  .lugar:focus-visible rect {
    stroke: var(--rsb-red); stroke-width: 2.5;
    filter: drop-shadow(0 0 4px rgba(227,6,19,0.45));
  }
  .lugar.selected {
    transform: scale(1.12);
  }
  .lugar.selected rect {
    stroke: var(--rsb-red); stroke-width: 2.5;
    filter: drop-shadow(0 0 8px rgba(227,6,19,0.55));
  }
  .lugar rect {
    transition: stroke-width 0.16s var(--ease), fill 0.16s var(--ease), stroke 0.16s var(--ease);
  }
  .lugar text {
    font-weight: 700; text-anchor: middle;
    pointer-events: none; dominant-baseline: middle;
    letter-spacing: 0.01em;
  }

  /* Estado livre */
  .lugar.livre rect {
    fill: var(--lugar-livre); stroke: var(--lugar-livre-borda); stroke-width: 1;
  }
  .lugar.livre text { fill: var(--lugar-livre-texto); }

  /* Estado reservado (R*) — destaque com sombra dourada subtil */
  .lugar.reservado rect {
    fill: var(--lugar-r); stroke: var(--lugar-r-borda); stroke-width: 1.5;
    filter: drop-shadow(0 1.5px 2.5px rgba(180,83,9,0.40));
  }
  .lugar.reservado text { fill: var(--lugar-r-texto); }

  /* Estado ocupado (atribuído) */
  .lugar.ocupado rect {
    fill: var(--lugar-ocupado); stroke: var(--lugar-ocupado-borda); stroke-width: 1.5;
  }
  .lugar.ocupado text { fill: var(--lugar-ocupado-borda); }

  /* Estado presente (check-in feito) */
  .lugar.presente rect {
    fill: var(--lugar-presente); stroke: var(--lugar-presente-borda); stroke-width: 2;
    filter: drop-shadow(0 1px 2px rgba(22,163,74,0.30));
  }
  .lugar.presente text { fill: #15803d; }

  /* --- Painel lateral de info --- */
  .info {
    background: #fff;
    border-radius: 16px;
    padding: 22px;
    box-shadow: var(--sh-md);
    border: 1px solid var(--linha-clara);
    height: fit-content;
    position: sticky; top: 80px;
  }
  .info h3 {
    margin: 0 0 14px; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.10em;
    color: var(--texto-soft); font-weight: 700;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--linha-clara);
  }
  .info .placeholder {
    padding: 36px 8px; text-align: center;
    color: var(--texto-soft); font-size: 13px;
    line-height: 1.55;
  }
  .info .lugar-tag {
    display: inline-block; padding: 5px 11px;
    border-radius: 999px; font-weight: 700;
    font-size: 11.5px; margin-bottom: 12px;
    letter-spacing: 0.02em;
    box-shadow: var(--sh-sm);
  }
  .info .lugar-tag.r {
    background: linear-gradient(180deg, #fef08a 0%, var(--lugar-r) 100%);
    color: var(--lugar-r-texto);
    border: 1px solid var(--lugar-r-borda);
  }
  .info .lugar-tag.n {
    background: linear-gradient(180deg, #f8fafc 0%, var(--lugar-livre) 100%);
    color: var(--lugar-livre-texto);
    border: 1px solid var(--lugar-livre-borda);
  }
  .info .nome {
    font-size: 17px; font-weight: 700; margin: 0 0 4px;
    line-height: 1.28; letter-spacing: -0.01em;
    color: var(--texto);
  }
  .info .cargo {
    font-size: 12px; color: var(--rsb-red);
    font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.04em; margin: 4px 0 2px;
  }
  .info .entidade {
    font-size: 13px; color: var(--texto-mute);
    margin: 2px 0;
  }
  .info .categoria { margin-top: 10px; }
  .info .pill {
    display: inline-block; padding: 4px 10px; border-radius: 999px;
    font-size: 10.5px; font-weight: 700; color: #fff;
    text-transform: uppercase; letter-spacing: 0.05em;
    box-shadow: 0 1px 0 rgba(255,255,255,0.20) inset, var(--sh-sm);
  }
  .info .status {
    margin-top: 14px; padding: 10px 14px; border-radius: 10px;
    font-size: 12.5px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  .info .status.presente {
    background: linear-gradient(180deg, #ecfdf5 0%, var(--lugar-presente) 100%);
    color: #15803d;
    border: 1px solid var(--lugar-presente-borda);
  }
  .info .status.aguarda {
    background: linear-gradient(180deg, #fffbeb 0%, #fef3c7 100%);
    color: #92400e;
    border: 1px solid #fde68a;
  }

  /* --- Legenda: quadrados premium --- */
  .legenda {
    margin-top: 20px; padding-top: 18px;
    border-top: 1px solid var(--linha-clara);
    display: flex; flex-wrap: wrap; gap: 14px 18px;
    font-size: 11.5px; color: var(--texto-mute);
  }
  .legenda .item {
    display: flex; align-items: center; gap: 7px;
    font-weight: 500;
  }
  .legenda .sw {
    width: 16px; height: 16px; border-radius: 4px;
    border: 1px solid;
    box-shadow: 0 1px 1px rgba(15,23,42,0.06) inset, var(--sh-sm);
  }
  .legenda .sw.livre { background: var(--lugar-livre); border-color: var(--lugar-livre-borda); }
  .legenda .sw.reservado { background: var(--lugar-r); border-color: var(--lugar-r-borda); }
  .legenda .sw.ocupado { background: var(--lugar-ocupado); border-color: var(--lugar-ocupado-borda); }
  .legenda .sw.presente { background: var(--lugar-presente); border-color: var(--lugar-presente-borda); }

  /* --- Stats cards premium --- */
  .stats {
    margin-top: 18px; padding-top: 16px;
    border-top: 1px solid var(--linha-clara);
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    font-size: 11px;
  }
  .stats .box {
    padding: 10px 12px;
    background: linear-gradient(180deg, #fff 0%, var(--fundo-soft) 100%);
    border: 1px solid var(--linha-clara);
    border-left: 3px solid var(--rsb-red);
    border-radius: 8px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--texto-mute);
    font-weight: 600;
    transition: transform 0.14s var(--ease), box-shadow 0.14s var(--ease);
  }
  .stats .box:hover {
    transform: translateY(-1px);
    box-shadow: var(--sh-md);
  }
  .stats strong {
    display: block; font-size: 22px; color: var(--rsb-red);
    font-weight: 800; line-height: 1.1; margin-bottom: 2px;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }

  /* --- Botão sentar com gradient subtle --- */
  .btn-sentar {
    margin-top: 14px; padding: 11px 14px; font-size: 12.5px;
    background: linear-gradient(180deg, #ee1c2a 0%, var(--rsb-red) 55%, var(--rsb-red-dark) 100%);
    color: #fff; border: 1px solid var(--rsb-red-dark);
    border-radius: 10px;
    cursor: pointer; font-family: inherit; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em; width: 100%;
    box-shadow: 0 1px 0 rgba(255,255,255,0.20) inset, 0 1px 2px rgba(176,4,16,0.30);
    transition: transform 0.14s var(--ease), box-shadow 0.14s var(--ease), filter 0.14s var(--ease);
  }
  .btn-sentar:hover {
    box-shadow: 0 1px 0 rgba(255,255,255,0.20) inset, 0 6px 16px rgba(176,4,16,0.35);
    filter: brightness(1.04);
  }
  .btn-sentar:active { transform: translateY(1px); }
  .btn-sentar.danger {
    background: linear-gradient(180deg, #d97706 0%, #b45309 60%, #92400e 100%);
    border-color: #92400e;
    box-shadow: 0 1px 0 rgba(255,255,255,0.20) inset, 0 1px 2px rgba(146,64,14,0.30);
  }
  .btn-sentar.danger:hover {
    box-shadow: 0 1px 0 rgba(255,255,255,0.20) inset, 0 6px 16px rgba(146,64,14,0.35);
  }

  /* --- Modal sentar: backdrop blur, sombra elegante --- */
  @keyframes modal-in {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes modal-bg-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(15,23,42,0.45);
    backdrop-filter: blur(6px) saturate(140%);
    -webkit-backdrop-filter: blur(6px) saturate(140%);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal-bg.show {
    display: flex;
    animation: modal-bg-in 0.2s var(--ease);
  }
  .modal-card {
    background: #fff; border-radius: 16px; padding: 26px;
    max-width: 500px; width: 100%; max-height: 84vh; overflow-y: auto;
    box-shadow: var(--sh-xl);
    border: 1px solid rgba(255,255,255,0.6);
    animation: modal-in 0.24s var(--ease);
  }
  .modal-card h3 {
    margin: 0 0 6px; font-size: 17px;
    font-weight: 700; letter-spacing: -0.01em;
  }
  .modal-card .lead {
    font-size: 13px; color: var(--texto-mute);
    margin: 0 0 18px; line-height: 1.5;
  }
  .modal-card input[type=search] {
    width: 100%; padding: 11px 14px; font-size: 14px; font-family: inherit;
    border: 1px solid var(--linha); border-radius: 10px;
    background: var(--fundo-soft); margin-bottom: 12px; box-sizing: border-box;
    transition: border-color 0.14s var(--ease), box-shadow 0.14s var(--ease), background 0.14s var(--ease);
  }
  .modal-card input[type=search]:focus {
    outline: none; border-color: var(--rsb-red);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(227,6,19,0.12);
  }
  .modal-lista {
    max-height: 340px; overflow-y: auto;
    border: 1px solid var(--linha-clara);
    border-radius: 10px; margin-bottom: 18px;
    background: var(--fundo-soft);
  }
  .modal-lista .item {
    padding: 11px 14px; border-bottom: 1px solid var(--linha-clara);
    cursor: pointer; font-size: 13px;
    transition: background 0.12s var(--ease), padding-left 0.16s var(--ease);
  }
  .modal-lista .item:last-child { border-bottom: none; }
  .modal-lista .item:hover {
    background: #fff;
    padding-left: 18px;
  }
  .modal-lista .item.selected {
    background: linear-gradient(180deg, #fffbeb 0%, #fef3c7 100%);
    box-shadow: inset 3px 0 0 var(--lugar-r-borda);
    padding-left: 17px;
  }
  .modal-lista .item .nome {
    font-weight: 600; color: var(--texto);
  }
  .modal-lista .item .meta {
    font-size: 11.5px; color: var(--texto-mute); margin-top: 3px;
  }
  .modal-actions {
    display: flex; gap: 10px; justify-content: flex-end;
  }
  .modal-actions button {
    padding: 9px 18px; font-size: 13px; font-family: inherit;
    border-radius: 10px; cursor: pointer; font-weight: 600;
    transition: transform 0.14s var(--ease), box-shadow 0.14s var(--ease), filter 0.14s var(--ease);
  }
  .modal-actions .primary {
    background: linear-gradient(180deg, #ee1c2a 0%, var(--rsb-red) 60%, var(--rsb-red-dark) 100%);
    color: #fff; border: 1px solid var(--rsb-red-dark);
    box-shadow: 0 1px 0 rgba(255,255,255,0.20) inset, 0 1px 2px rgba(176,4,16,0.30);
  }
  .modal-actions .primary:hover:not(:disabled) {
    filter: brightness(1.04);
    box-shadow: 0 1px 0 rgba(255,255,255,0.20) inset, 0 4px 12px rgba(176,4,16,0.30);
  }
  .modal-actions .secondary {
    background: #fff; color: var(--texto);
    border: 1px solid var(--linha);
  }
  .modal-actions .secondary:hover {
    background: var(--fundo-soft); border-color: #94a3b8;
  }
  .modal-actions button:active { transform: translateY(1px); }
  .modal-actions .primary:disabled {
    background: #e5e7eb; color: #9ca3af;
    border-color: #e5e7eb; cursor: not-allowed;
    box-shadow: none; filter: none;
  }

  /* --- Toast: slide-in elegante --- */
  @keyframes toast-in {
    from { opacity: 0; transform: translate(-50%, 12px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: rgba(15,23,42,0.96);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #fff; padding: 12px 22px;
    border-radius: 10px; font-size: 13px; font-weight: 500;
    z-index: 200;
    opacity: 0; transition: opacity 0.22s var(--ease), transform 0.22s var(--ease);
    pointer-events: none;
    box-shadow: var(--sh-lg);
    border: 1px solid rgba(255,255,255,0.08);
    letter-spacing: 0.01em;
  }
  .toast.show {
    opacity: 1;
    animation: toast-in 0.28s var(--ease);
  }
  .toast.err {
    background: linear-gradient(180deg, #c30912 0%, var(--rsb-red-dark) 100%);
    border-color: rgba(255,255,255,0.10);
  }
  .toast.ok {
    background: linear-gradient(180deg, #16a34a 0%, #15803d 100%);
    border-color: rgba(255,255,255,0.10);
  }

  /* --- Print: limpo para A3 landscape --- */
  @media print {
    @page { size: A3 landscape; margin: 8mm; }
    body { background: #fff; }
    .top, .info, .toast, .modal-bg { display: none !important; }
    .wrap {
      display: block; max-width: none;
      margin: 0; padding: 0; gap: 0;
    }
    .mapa-card {
      box-shadow: none; padding: 0;
      border: none; border-radius: 0;
    }
    .mapa-card h2 { font-size: 20px; margin-bottom: 4px; }
    .mapa-card .local { margin-bottom: 12px; }
    svg.mapa {
      background: #fff; border: none;
      page-break-inside: avoid;
    }
    .legenda {
      margin-top: 14px; padding-top: 10px;
      border-top: 1px solid #cbd5e1;
      page-break-inside: avoid;
    }
    .lugar { transition: none !important; }
    .lugar:hover { transform: none !important; }
  }
</style>
</head>
<body>

<div class="top">
  <h1>Mapa da sala</h1>
  <span class="meta" id="meta-info">A carregar…</span>
  <span class="grow"></span>
  <button onclick="location.reload()">↻ Recarregar</button>
  <button class="print" onclick="window.print()">🖨️ Imprimir / PDF</button>
</div>

<div class="wrap">
  <div class="mapa-card">
    <h2 id="sala-nome">—</h2>
    <p class="local" id="sala-evento">—</p>
    <svg class="mapa" id="svg-mapa" viewBox="0 0 1000 450"></svg>
    <div class="legenda" id="legenda"></div>
  </div>

  <aside class="info">
    <h3>Informação do lugar</h3>
    <div id="info-conteudo" class="placeholder">
      Clica num lugar do mapa para ver quem está atribuído.
    </div>
    <div class="stats" id="stats"></div>
  </aside>
</div>

<!-- Modal: Sentar inscrito num lugar livre -->
<div class="modal-bg" id="modal-sentar">
  <div class="modal-card">
    <h3>Sentar inscrito · Lugar <span id="modal-lugar">—</span></h3>
    <p class="lead" id="modal-lead">Escolhe um inscrito sem lugar atribuído.</p>
    <input type="search" id="modal-busca" placeholder="Pesquisar nome, cargo, entidade…">
    <div class="modal-lista" id="modal-lista"></div>
    <div class="modal-actions">
      <button class="secondary" id="modal-cancelar">Cancelar</button>
      <button class="primary" id="modal-confirmar" disabled>Sentar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const URL_INSCRITOS = "data/inscritos.json?t=" + Date.now();
const URL_EVENTO = "data/evento.json?t=" + Date.now();
const URL_PRESENCAS = "data/presencas.json?t=" + Date.now();

const GH_OWNER = "RSBLisboa";
const GH_REPO = "Presencas";
const GH_BRANCH = "main";
const LS_PAT_KEY = "rsb_pat_tablet"; // partilhado com a app de presenças
const PAT_CIFRADO = "DknFWCRvCUDKncniIpJuB0yem1+lklo48JTgckFwkgo7aYrVptaG1OKPLU2MKMcxDaInhfVrXZlCCp+BPYR/dI7yrrRmZRikENfOBrqB8drkqFsd+CTiMfyFJEaNCXma9kBVK8g4O7YTjowyqKsp7jFyOkxYpBuPsBdTs5kxw+bCCOlZe8kpwrk=";
const AUTO_AUTH_PASSWORD = "RSBL18MAI2026!";

let DADOS = { inscritos: [], evento: null, presencas: [], inscritosSha: null };
let LUGAR_SELECIONADO = null;
let MODAL_INSCRITO_ID = null;

async function fj(u) {
  try { const r = await fetch(u, { cache: "no-store" }); if (!r.ok) return null; return await r.json(); }
  catch (_) { return null; }
}
const esc = s => String(s == null ? "" : s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const normalizar = s => (s||"").toString().toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
const utf8ToBase64 = s => btoa(unescape(encodeURIComponent(s)));
const base64ToUtf8 = b => decodeURIComponent(escape(atob(b)));

function getPAT() { return localStorage.getItem(LS_PAT_KEY) || ""; }
function setPAT(t) { if (t) localStorage.setItem(LS_PAT_KEY, t); }

async function decifrarPAT(password) {
  const bundle = Uint8Array.from(atob(PAT_CIFRADO), c => c.charCodeAt(0));
  const salt = bundle.slice(0, 16);
  const iv = bundle.slice(16, 28);
  const ct = bundle.slice(28);
  const baseKey = await crypto.subtle.importKey(
    "raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 150000, hash: "SHA-256" },
    baseKey, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(pt);
}

async function garantirPAT() {
  if (getPAT()) return getPAT();
  try {
    const tok = await decifrarPAT(AUTO_AUTH_PASSWORD);
    setPAT(tok);
    return tok;
  } catch (e) {
    throw new Error("Sem PAT — abre a app de presenças no tablet primeiro para autoconfigurar.");
  }
}

function ghHeaders() {
  return { "Accept": "application/vnd.github.v3+json", "Authorization": "token " + getPAT() };
}
function ghContentsUrl(path) {
  return "https://api.github.com/repos/" + GH_OWNER + "/" + GH_REPO + "/contents/" + encodeURI(path) + "?ref=" + GH_BRANCH;
}
async function ghLer(path) {
  const r = await fetch(ghContentsUrl(path), { headers: ghHeaders() });
  if (!r.ok) throw new Error("GET " + path + ": " + r.status);
  const j = await r.json();
  return { sha: j.sha, payload: JSON.parse(base64ToUtf8(j.content.replace(/\n/g,""))) };
}
async function ghEscrever(path, payload, sha, msg) {
  const body = {
    message: msg || ("update " + path),
    content: utf8ToBase64(JSON.stringify(payload, null, 2)),
    branch: GH_BRANCH,
    sha: sha
  };
  const r = await fetch(
    "https://api.github.com/repos/" + GH_OWNER + "/" + GH_REPO + "/contents/" + encodeURI(path),
    { method: "PUT", headers: { ...ghHeaders(), "Content-Type": "application/json" }, body: JSON.stringify(body) }
  );
  if (r.status === 409 || r.status === 422) { const e = new Error("CONFLICT"); e.code = "CONFLICT"; throw e; }
  if (!r.ok) throw new Error("PUT " + path + ": " + r.status);
  const j = await r.json();
  return j.content.sha;
}

function toast(msg, kind) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (kind ? " " + kind : "");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove("show"), 2800);
}

const CORES_CAT = {
  "Organização": "#1a1a1a",
  "Orador": "#E30613",
  "Orador Convidado": "#C46C00",
  "Moderação": "#6b21a8",
  "Coautor do Livreto": "#0e7490",
  "VIP": "#a16207",
  "Imprensa": "#1565c0"
};

function inscritoNoLugar(lugar) {
  return DADOS.inscritos.find(i => String(i.lugar || "") === String(lugar));
}
function temPresenca(idInscricao) {
  return DADOS.presencas.some(p => Number(p.idInscricao) === Number(idInscricao) && p.presente);
}

function classeLugar(lugar) {
  const i = inscritoNoLugar(lugar);
  if (i && temPresenca(i.id)) return "presente";
  if (i) return "ocupado";
  if (String(lugar).toUpperCase().startsWith("R")) return "reservado";
  return "livre";
}

function renderMapa() {
  const evt = DADOS.evento || {};
  const sala = evt.sala || {};
  const layout = Array.isArray(sala.layout) ? sala.layout : [];
  // Tipo unificado: editor usa 'auditorio'/'retangular'; mapa traduz para 'oval'/'reto'
  const tipoSrc = sala.tipo;
  const ehAuditorio = tipoSrc === 'oval' || tipoSrc === 'auditorio';
  const tipo = ehAuditorio ? 'oval' : 'reto';
  const editorCfg = sala.editorCfg || {};
  // Dimensões da cadeira herdadas do editor (mesma proporção)
  const seatW = editorCfg.seat || 32;
  const seatH = Math.round(seatW * 0.78);
  const viewBox = sala.viewBox || (ehAuditorio ? "0 0 1400 900" : "0 0 1000 480");
  const svg = document.getElementById("svg-mapa");
  svg.setAttribute("viewBox", viewBox);

  // Palco — coordenadas vêm do editor se publicadas, senão fallback
  let html = '';
  const palcoFromEd = sala.palcoConfig || null;
  const centroFromEd = sala.centro || null;
  const ovalCx = (centroFromEd && centroFromEd.cx) || (palcoFromEd && palcoFromEd.cx) || 700;
  const ovalCy = (centroFromEd && centroFromEd.cy) || (palcoFromEd && palcoFromEd.cy) || 145;
  const palcoR = (palcoFromEd && palcoFromEd.r) || 70;
  if (ehAuditorio) {
    // Gradient + sombra subtil para o palco circular (estilo premium)
    html += `
      <defs>
        <radialGradient id="palco-grad" cx="50%" cy="40%" r="60%">
          <stop offset="0%" stop-color="#fbcfe8"/>
          <stop offset="100%" stop-color="#f9a8d4"/>
        </radialGradient>
        <radialGradient id="palco-inner" cx="50%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#db2777"/>
          <stop offset="100%" stop-color="#9d174d"/>
        </radialGradient>
        <filter id="palco-shadow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
          <feOffset dy="2"/>
          <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
          <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <circle cx="${ovalCx}" cy="${ovalCy}" r="${palcoR}" fill="url(#palco-grad)" stroke="#be185d" stroke-width="1.5" opacity="0.92" filter="url(#palco-shadow)"/>
      <circle cx="${ovalCx}" cy="${ovalCy}" r="${Math.round(palcoR * 0.56)}" fill="url(#palco-inner)"/>
      <text x="${ovalCx}" y="${ovalCy + 8}" style="fill:#fff;font-size:${Math.round(palcoR * 0.32)}px;font-weight:800;text-anchor:middle;font-family:'Inter','Segoe UI',sans-serif">1</text>
      <text x="${ovalCx}" y="${ovalCy + palcoR + 28}" style="fill:#94a3b8;font-size:11.5px;font-weight:700;text-anchor:middle;letter-spacing:0.18em;text-transform:uppercase">Palco · Painel central</text>
    `;
  } else {
    html += `
      <rect class="palco" x="180" y="10" width="640" height="42" rx="6"/>
      <text class="palco-label" x="500" y="37">Palco · Painel</text>
    `;
  }

  // Agrupar por propriedade `fila` (preferida) ou por cluster Y (fallback).
  function agruparFilas(slots) {
    if (slots.some(s => s.fila)) {
      const map = new Map();
      for (const s of slots) {
        const k = s.fila || '?';
        if (!map.has(k)) map.set(k, []);
        map.get(k).push(s);
      }
      // Ordena pelas distâncias ao palco para tipo oval, por Y para outros.
      const ordem = Array.from(map.entries());
      ordem.sort((a, b) => {
        const yA = a[1].reduce((s, x) => s + x.y, 0) / a[1].length;
        const yB = b[1].reduce((s, x) => s + x.y, 0) / b[1].length;
        return yA - yB;
      });
      return ordem.map(([letra, slots]) => ({ letra, slots }));
    }
    // Fallback: clustering por Y
    const tol = 18;
    const ordenados = slots.slice().sort((a, b) => a.y - b.y);
    const filas = [];
    for (const s of ordenados) {
      const fila = filas.find(f => Math.abs(f.y - s.y) < tol);
      if (fila) fila.slots.push(s);
      else filas.push({ y: s.y, slots: [s] });
    }
    let letraIdx = 0;
    return filas.map(f => {
      const todosR = f.slots.every(s => String(s.lugar).toUpperCase().startsWith('R'));
      return { letra: todosR ? 'R' : String.fromCharCode(65 + letraIdx++), slots: f.slots };
    });
  }
  const grupos = agruparFilas(layout);

  // Desenhar arco curvo de fundo para cada fila (apenas modo oval).
  // Em design top-tier: linha contínua subtil debaixo dos lugares, ligeiramente abaixo
  // do centro do lugar para sugerir "chão" da fila.
  if (tipo === 'oval') {
    grupos.forEach(g => {
      if (g.slots.length < 2) return;
      const raios = g.slots.map(s => Math.hypot(s.x - ovalCx, s.y - ovalCy));
      const r = raios.reduce((a,b) => a+b, 0) / raios.length + 14; // ligeiramente abaixo
      const ang = s => Math.atan2(s.y - ovalCy, s.x - ovalCx);
      const angulos = g.slots.map(ang).sort((a,b) => a-b);
      const a0 = angulos[0], a1 = angulos[angulos.length - 1];
      const margem = 0.06;
      const aStart = a0 - margem, aEnd = a1 + margem;
      const x1 = ovalCx + r * Math.cos(aStart);
      const y1 = ovalCy + r * Math.sin(aStart);
      const x2 = ovalCx + r * Math.cos(aEnd);
      const y2 = ovalCy + r * Math.sin(aEnd);
      const largeArc = (aEnd - aStart) > Math.PI ? 1 : 0;
      const ehR = g.letra === 'R';
      const cor = ehR ? '#fbbf24' : '#e2e8f0';
      const sw = ehR ? 1.5 : 1;
      html += `<path d="M ${x1.toFixed(1)} ${y1.toFixed(1)} A ${r.toFixed(1)} ${r.toFixed(1)} 0 ${largeArc} 1 ${x2.toFixed(1)} ${y2.toFixed(1)}" fill="none" stroke="${cor}" stroke-width="${sw}" opacity="${ehR ? 0.55 : 0.7}"/>`;
    });
  }

  // Letras de fila nas duas pontas (com fundo branco discreto para legibilidade).
  grupos.forEach(g => {
    if (!g.slots.length) return;
    const sorted = g.slots.slice().sort((a, b) => a.x - b.x);
    const sEsq = sorted[0];
    const sDir = sorted[sorted.length - 1];
    const offsetX = 32;
    const ehR = g.letra === 'R';
    const cor = ehR ? '#b45309' : '#475569';
    const bgCor = ehR ? '#fef3c7' : '#f8fafc';
    [{ x: sEsq.x - offsetX, y: sEsq.y }, { x: sDir.x + offsetX, y: sDir.y }].forEach(p => {
      html += `
        <circle cx="${p.x}" cy="${p.y}" r="11" fill="${bgCor}" stroke="${cor}" stroke-width="0.8" opacity="0.95"/>
        <text x="${p.x}" y="${p.y + 4}" style="font-size:12.5px;font-weight:800;fill:${cor};text-anchor:middle;font-family:'Inter','Segoe UI',sans-serif">${g.letra}</text>
      `;
    });
  });

  layout.forEach(slot => {
    const ehR = String(slot.lugar).toUpperCase().startsWith("R");
    // Tamanhos derivados do editor (mesma proporção visual)
    const w = ehR ? Math.round(seatW * 1.25) : seatW;
    const h = ehR ? Math.round(seatH * 1.25) : seatH;
    const x = slot.x - w/2, y = slot.y - h/2;
    const cls = classeLugar(slot.lugar);
    const i = inscritoNoLugar(slot.lugar);
    const filaTxt = slot.fila ? slot.fila + ' · ' : '';
    const title = i
      ? filaTxt + slot.lugar + " · " + i.nome + (i.entidade ? " (" + i.entidade + ")" : "")
      : (ehR ? "Reservado " + slot.lugar + " — por atribuir" : "Lugar " + filaTxt + slot.lugar + " — vazio");
    const txt = ehR ? "★" + slot.lugar.substring(1) : slot.lugar;
    // Tamanho de fonte ajustado pelo tamanho do lugar (mesma regra do editor)
    const fontSize = ehR ? Math.max(11, seatW * 0.40) : Math.max(9, seatW * 0.32);
    html += `
      <g class="lugar ${cls}" data-lugar="${esc(slot.lugar)}" tabindex="0">
        <title>${esc(title)}</title>
        <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="4"/>
        <text x="${slot.x}" y="${slot.y + fontSize * 0.36}" font-size="${fontSize.toFixed(1)}">${esc(txt)}</text>
      </g>`;
  });

  svg.innerHTML = html;

  // Click handler (event delegation)
  svg.querySelectorAll(".lugar").forEach(el => {
    el.addEventListener("click", () => seleccionarLugar(el.dataset.lugar));
  });

  // Legenda
  document.getElementById("legenda").innerHTML = `
    <div class="item"><div class="sw livre"></div> Livre</div>
    <div class="item"><div class="sw reservado"></div> ★ Reservado (R*) — VIP / orador</div>
    <div class="item"><div class="sw ocupado"></div> Atribuído</div>
    <div class="item"><div class="sw presente"></div> Presença marcada</div>
  `;

  renderStats();
}

function seleccionarLugar(lugar) {
  // Estado visual
  document.querySelectorAll(".lugar").forEach(el => el.classList.remove("selected"));
  const el = document.querySelector('.lugar[data-lugar="' + CSS.escape(lugar) + '"]');
  if (el) el.classList.add("selected");
  LUGAR_SELECIONADO = lugar;

  // Painel lateral
  const i = inscritoNoLugar(lugar);
  const ehR = String(lugar).toUpperCase().startsWith("R");
  const wrap = document.getElementById("info-conteudo");
  if (!i) {
    wrap.innerHTML = `
      <div class="lugar-tag ${ehR ? "r" : "n"}">${ehR ? "⭐ Lugar reservado " : "Lugar "}${esc(lugar)}</div>
      <p class="placeholder" style="padding:8px 0">Sem inscrito atribuído.</p>
      <button class="btn-sentar" id="btn-sentar">+ Sentar inscrito aqui</button>
    `;
    wrap.classList.remove("placeholder");
    const btn = document.getElementById("btn-sentar");
    if (btn) btn.addEventListener("click", () => abrirModalSentar(lugar));
    return;
  }
  const presente = temPresenca(i.id);
  const cat = i.categoria;
  wrap.innerHTML = `
    <div class="lugar-tag ${ehR ? "r" : "n"}">${ehR ? "⭐ Lugar reservado " : "Lugar "}${esc(lugar)}</div>
    <p class="nome">${esc(i.nome)}</p>
    ${i.cargo ? `<p class="cargo">${esc(i.cargo)}</p>` : ""}
    ${i.entidade ? `<p class="entidade">${esc(i.entidade)}</p>` : ""}
    ${cat ? `<div class="categoria"><span class="pill" style="background:${CORES_CAT[cat] || "#5a5a5a"}">${esc(cat)}</span></div>` : ""}
    <div class="status ${presente ? "presente" : "aguarda"}">
      ${presente ? "✓ Presença confirmada" : "Aguarda check-in"}
    </div>
    ${i.token ? `<p style="margin-top:10px;font-size:11px;color:var(--texto-mute);font-family:monospace">token: ${esc(i.token)}</p>` : ""}
    <button class="btn-sentar danger" id="btn-desentar">Remover deste lugar</button>
  `;
  wrap.classList.remove("placeholder");
  const btn = document.getElementById("btn-desentar");
  if (btn) btn.addEventListener("click", () => sentarInscrito(null, lugar, i.id));
}

function abrirModalSentar(lugar) {
  document.getElementById("modal-lugar").textContent = lugar;
  document.getElementById("modal-busca").value = "";
  MODAL_INSCRITO_ID = null;
  document.getElementById("modal-confirmar").disabled = true;
  renderModalLista("");
  document.getElementById("modal-sentar").classList.add("show");
  setTimeout(() => document.getElementById("modal-busca").focus(), 50);
}
function fecharModalSentar() {
  document.getElementById("modal-sentar").classList.remove("show");
  MODAL_INSCRITO_ID = null;
}
function renderModalLista(busca) {
  const semLugar = DADOS.inscritos
    .filter(i => !i.lugar)
    .sort((a,b) => (a.nome || "").localeCompare(b.nome || "", "pt-PT"));
  const q = normalizar(busca);
  const filtrados = q
    ? semLugar.filter(i =>
        normalizar(i.nome).includes(q) ||
        normalizar(i.cargo || "").includes(q) ||
        normalizar(i.entidade || "").includes(q))
    : semLugar;
  const wrap = document.getElementById("modal-lista");
  if (!filtrados.length) {
    wrap.innerHTML = '<div class="item" style="cursor:default;color:#888;text-align:center">Sem resultados.</div>';
    return;
  }
  wrap.innerHTML = filtrados.map(i => `
    <div class="item${MODAL_INSCRITO_ID === i.id ? " selected" : ""}" data-id="${i.id}">
      <div class="nome">${esc(i.nome)}</div>
      <div class="meta">${esc((i.cargo || "") + (i.entidade ? " · " + i.entidade : ""))}</div>
    </div>`).join("");
  wrap.querySelectorAll(".item[data-id]").forEach(el => {
    el.addEventListener("click", () => {
      MODAL_INSCRITO_ID = parseInt(el.dataset.id, 10);
      wrap.querySelectorAll(".item").forEach(x => x.classList.remove("selected"));
      el.classList.add("selected");
      document.getElementById("modal-confirmar").disabled = false;
    });
  });
}

async function sentarInscrito(idInscrito, lugar, removerId) {
  try {
    await garantirPAT();
  } catch (e) {
    toast(e.message, "err");
    return;
  }
  const verbo = idInscrito ? "A sentar" : "A remover do lugar";
  toast(verbo + "…");
  try {
    // Read-modify-write a inscritos.json com retry em conflito
    const tentar = async () => {
      const { sha, payload } = await ghLer("data/inscritos.json");
      const arr = payload.inscritos || [];
      // Limpa quem tem este lugar
      arr.forEach(i => { if (String(i.lugar || "") === String(lugar)) delete i.lugar; });
      // Atribui ao novo
      if (idInscrito) {
        const novo = arr.find(i => i.id === idInscrito);
        if (!novo) throw new Error("Inscrito id=" + idInscrito + " não encontrado.");
        novo.lugar = lugar;
      }
      payload.actualizadoEm = new Date().toISOString();
      const msg = idInscrito
        ? "sentar id=" + idInscrito + " no lugar " + lugar
        : "remover lugar " + lugar + " (id=" + removerId + ")";
      await ghEscrever("data/inscritos.json", payload, sha, msg);
      // Actualiza estado local
      DADOS.inscritos = arr;
      DADOS.inscritosSha = sha;
    };
    try { await tentar(); }
    catch (e) {
      if (e.code === "CONFLICT") { await tentar(); }
      else throw e;
    }
    fecharModalSentar();
    renderMapa();
    seleccionarLugar(lugar);
    toast(idInscrito ? "Inscrito sentado em " + lugar : "Lugar " + lugar + " libertado", "ok");
  } catch (e) {
    toast("Erro: " + e.message, "err");
  }
}

function renderStats() {
  const layout = (DADOS.evento && DADOS.evento.sala && DADOS.evento.sala.layout) || [];
  const total = layout.length;
  const ocupados = layout.filter(s => inscritoNoLugar(s.lugar)).length;
  const presentes = layout.filter(s => {
    const i = inscritoNoLugar(s.lugar);
    return i && temPresenca(i.id);
  }).length;
  const livres = total - ocupados;
  const reservadosLayout = layout.filter(s => String(s.lugar).toUpperCase().startsWith('R'));
  const rTotal = reservadosLayout.length;
  const rAtribuidos = reservadosLayout.filter(s => inscritoNoLugar(s.lugar)).length;
  document.getElementById("stats").innerHTML = `
    <div class="box"><strong>${total}</strong>Lugares</div>
    <div class="box"><strong>${ocupados}</strong>Atribuídos</div>
    <div class="box"><strong>${presentes}</strong>Presentes</div>
    <div class="box"><strong>${livres}</strong>Livres</div>
    <div class="box" style="grid-column:1 / span 2;border-left-color:#b45309;background:#fef9c3">
      <strong style="color:#78350f">★ ${rAtribuidos}/${rTotal}</strong>Reservados (R*)
    </div>
  `;
}

// Listeners do modal sentar
document.getElementById("modal-cancelar").addEventListener("click", fecharModalSentar);
document.getElementById("modal-sentar").addEventListener("click", e => {
  if (e.target === e.currentTarget) fecharModalSentar();
});
document.getElementById("modal-busca").addEventListener("input", e => renderModalLista(e.target.value));
document.getElementById("modal-confirmar").addEventListener("click", () => {
  if (MODAL_INSCRITO_ID != null && LUGAR_SELECIONADO) {
    sentarInscrito(MODAL_INSCRITO_ID, LUGAR_SELECIONADO);
  }
});

(async function init() {
  const [ins, evt, pres] = await Promise.all([fj(URL_INSCRITOS), fj(URL_EVENTO), fj(URL_PRESENCAS)]);
  DADOS.inscritos = (ins && ins.inscritos) || [];
  DADOS.evento = evt || (ins && ins.evento) || {};
  DADOS.presencas = (pres && pres.marcacoes) || [];

  const evtData = DADOS.evento;
  document.getElementById("sala-nome").textContent =
    (evtData.sala && evtData.sala.nome) || "Sala do evento";
  document.getElementById("sala-evento").textContent =
    (evtData.titulo || "Evento") + " · " + (evtData.data || "");
  document.getElementById("meta-info").textContent =
    DADOS.inscritos.length + " inscritos · " +
    (evtData.sala && evtData.sala.layout ? evtData.sala.layout.length : 0) + " lugares";

  renderMapa();

  // Auto-refresh a cada 30s para apanhar presenças novas
  setInterval(async () => {
    const p2 = await fj(URL_PRESENCAS);
    DADOS.presencas = (p2 && p2.marcacoes) || [];
    renderMapa();

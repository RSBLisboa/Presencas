name: Process Apreciacao Issues

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: write
  issues: write

concurrency:
  group: apreciacao-write
  cancel-in-progress: false

jobs:
  process:
    if: github.event.issue.title == 'apreciacao-pending'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse issue, update apreciacao.json, close issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'data/apreciacao.json';
            const inscritosPath = 'data/inscritos.json';
            const issueNumber = context.payload.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const comment = async (body) => github.rest.issues.createComment({
              owner, repo, issue_number: issueNumber, body
            });
            const closeWith = async (state_reason) => github.rest.issues.update({
              owner, repo, issue_number: issueNumber, state: 'closed', state_reason
            });

            // 1. Parse issue body as JSON (tolerant to markdown code fences)
            let payload;
            try {
              let body = (context.payload.issue.body || '').trim();
              body = body.replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/i, '').trim();
              payload = JSON.parse(body);
            } catch (e) {
              await comment(`Erro parse JSON: ${e.message}`);
              await closeWith('not_planned');
              return;
            }

            // Aceita token (canonico) ou idInscricao (legado/numerico).
            // Se idInscricao parecer um token (8 chars alfanum), trata-o como token.
            let tokenRaw = String(payload.token ?? '').trim().toUpperCase();
            const idRaw = String(payload.idInscricao ?? '').trim();
            const idUpper = idRaw.toUpperCase();
            // Fallback: MS Forms / Power Automate por vezes envia o token no campo idInscricao.
            if (!tokenRaw && /^[A-Z0-9]{8}$/.test(idUpper) && !/^\d+$/.test(idRaw)) {
              tokenRaw = idUpper;
            }

            // 2a. Carregar inscritos.json para resolver token -> id (se necessario).
            let inscritosJson;
            try {
              inscritosJson = JSON.parse(fs.readFileSync(inscritosPath, 'utf8'));
            } catch (e) {
              await comment(`Erro a ler inscritos.json: ${e.message}`);
              await closeWith('not_planned');
              return;
            }
            const listaInscritos = inscritosJson.inscritos || [];

            let idInscricao = NaN;
            if (/^[A-Z0-9]{8}$/.test(tokenRaw)) {
              const insc = listaInscritos.find(p => p.token === tokenRaw);
              if (!insc) {
                await comment(`Token '${tokenRaw}' nao consta em inscritos.json.`);
                await closeWith('not_planned');
                return;
              }
              idInscricao = Number(insc.id);
            } else if (/^\d+$/.test(idRaw)) {
              idInscricao = parseInt(idRaw, 10);
            }
            if (isNaN(idInscricao)) {
              await comment(`Payload sem token valido nem idInscricao numerico. Recebido token='${tokenRaw}' idRaw='${idRaw}'.`);
              await closeWith('not_planned');
              return;
            }

            // 2b. Load current apreciacao.json
            let json;
            try {
              json = JSON.parse(fs.readFileSync(path, 'utf8'));
            } catch (e) {
              json = { schema: 'apreciacao@1', eventoId: 1, actualizadoEm: '', total: 0, respostas: [] };
            }

            // 3. Idempotency
            const exists = (json.respostas || []).some(r => r.idInscricao === idInscricao);
            if (exists) {
              await comment(`Skip: id=${idInscricao} ja existe em apreciacao.json.`);
              await closeWith('completed');
              return;
            }

            // 4. Append + write
            // Normaliza autorizaContacto para boolean (aceita "Sim"/"Não", true/false, "1"/"0")
            const autorizaRaw = String(payload.autorizaContacto ?? '').trim().toLowerCase();
            const autorizaContacto = ['sim', 'true', '1', 'yes', 'y', 's'].includes(autorizaRaw);
            const nova = {
              idInscricao,
              token: tokenRaw || null,
              submetidoEm: String(payload.submetidoEm || new Date().toISOString().slice(0,19)),
              email: String(payload.email ?? '').trim(),
              autorizaContacto,
              respostas: {
                q1: String(payload.q1 ?? ''),
                q2: String(payload.q2 ?? ''),
                q3: String(payload.q3 ?? ''),
                q4: String(payload.q4 ?? ''),
                q5: String(payload.q5 ?? ''),
                q6: String(payload.q6 ?? '')
              }
            };
            json.respostas = (json.respostas || []).concat([nova]);
            json.total = json.respostas.length;
            json.actualizadoEm = new Date().toISOString().slice(0,19);
            fs.writeFileSync(path, JSON.stringify(json, null, 2) + '\n');

            // 4b. Propagar email + autorizaContacto para inscritos.json (ficha do participante)
            // Reusa inscritosJson ja carregada acima para resolver token -> id.
            let inscritosTouched = false;
            try {
              const lista = inscritosJson.inscritos || [];
              const idx = lista.findIndex(p => p.id === idInscricao);
              if (idx >= 0) {
                const antesEmail = lista[idx].email || '';
                const antesAut = lista[idx].autorizaContacto;
                if (nova.email && lista[idx].email !== nova.email) {
                  lista[idx].email = nova.email;
                  inscritosTouched = true;
                }
                if (lista[idx].autorizaContacto !== autorizaContacto) {
                  lista[idx].autorizaContacto = autorizaContacto;
                  inscritosTouched = true;
                }
                if (inscritosTouched) {
                  inscritosJson.actualizadoEm = new Date().toISOString().slice(0,19);
                  fs.writeFileSync(inscritosPath, JSON.stringify(inscritosJson, null, 2) + '\n');
                  await comment(`Ficha actualizada: id=${idInscricao} email='${antesEmail}'->'${nova.email}', autorizaContacto=${antesAut}->${autorizaContacto}.`);
                }
              } else {
                await comment(`Aviso: id=${idInscricao} nao encontrado em inscritos.json (apreciacao gravada na mesma).`);
              }
            } catch (e) {
              await comment(`Aviso: falha a actualizar inscritos.json: ${e.message} (apreciacao gravada na mesma).`);
            }

            // 5. Commit + push
            const { execSync } = require('child_process');
            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "41898282+github-actions[bot]@users.noreply.github.com"');
            execSync(`git add ${path}${inscritosTouched ? ' ' + inscritosPath : ''}`);
            const msg = inscritosTouched
              ? `apreciacao+ficha: id=${idInscricao} (issue #${issueNumber})`
              : `apreciacao: +1 resposta id=${idInscricao} (issue #${issueNumber})`;
            execSync(`git commit -m "${msg}"`);
            execSync('git push');

            // 6. Close issue
            await comment(`OK: id=${idInscricao} adicionado a apreciacao.json.`);
            await closeWith('completed');
